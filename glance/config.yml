pages:
  - name: Fabian Command Center
    columns: 2
    components:
      - type: http
        title: "n8n Service"
        url: "http://localhost:5678/healthz/readiness"
        expected: 200
        cache: 1m

      - type: custom-api
        title: "System Health Summary"
        url: "http://localhost:5678/webhook/health-summary"
        cache: 5m
        template: |
          {{ range .JSON.checks }}
          <div>{{ .component }}: <span style="color: {{ if eq .status "ok" }}green{{ else if eq .status "warning" }}orange{{ else }}red{{ end }}">{{ .status }}</span> {{ .message }}</div>
          {{ end }}

      - type: custom-api
        title: "Business Snapshot"
        url: "http://localhost:5678/webhook/metrics"
        cache: 1h
        template: |
          <div>Cash: ${{ .JSON.cash }}</div>
          <div>Deals: {{ .JSON.deals_count }}</div>

      - type: http
        title: "Healthchecks.io (Backup)"
        url: "https://hc-ping.com/{{ .Env.HC_BACKUP_UUID }}/last"
        expected: 200
