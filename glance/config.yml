# LIFE OS — Dashboard (Phase 3: Personal + Company + Agents)
# Personal: Morning Pulse, Midday Check-in, Evening Review (+ Weekly Reflection email)
# Company: Daily Flash (TAS business intelligence)
# Agents: Agent Monitor (session history, findings, MCP health)
# Hard boundary: Daily Flash queries Company tables only. No Personal data.

pages:
  # ── Touchpoint 1: Morning Pulse ───────────────────
  - name: Morning Pulse
    columns: 2
    components:
      - type: clock
        title: "Sydney"
        timezone: "Australia/Sydney"

      - type: weather
        title: "Potts Point"
        latitude: -33.8688
        longitude: 151.2264
        units: metric
        cache: 30m

      - type: calendar
        title: "Today's Agenda"
        calendars:
          - url: ${GOOGLE_CALENDAR_ICAL_URL}
            name: "Fabian"

      - type: custom-api
        title: "Email Status"
        url: "http://n8n:5678/webhook/email-status"
        cache: 15m
        template: |
          <div>TAS inbox: {{ .JSON.tas_unread }} unread</div>
          <div>Personal inbox: {{ .JSON.personal_unread }} unread</div>

      - type: custom-api
        title: "PLAUD Transcripts (24h)"
        url: "http://n8n:5678/webhook/plaud-status"
        cache: 30m
        template: |
          <div>Processed: {{ .JSON.count_24h }}</div>
          <div>Last: {{ .JSON.last_title }} ({{ .JSON.last_time }})</div>

      - type: custom-api
        title: "Register Health"
        url: "http://n8n:5678/webhook/register-stats"
        cache: 1h
        template: |
          {{ range .JSON }}
          <div>{{ .register_name }}: {{ .confirmed }} confirmed, {{ .pending }} pending</div>
          {{ end }}

      - type: http
        title: "n8n Service"
        url: "http://n8n:5678/healthz/readiness"
        expected: 200
        cache: 1m

  # ── Touchpoint 2: Midday Check-in ────────────────
  - name: Midday Check-in
    columns: 2
    components:
      - type: custom-api
        title: "Today's Extractions"
        url: "http://n8n:5678/webhook/midday-checkin"
        cache: 15m
        template: |
          {{ range .JSON.extraction_summary }}
          <div>{{ .register_name }}: {{ .count }} new items</div>
          {{ end }}

      - type: custom-api
        title: "Upcoming Commitments"
        url: "http://n8n:5678/webhook/midday-checkin"
        cache: 15m
        template: |
          {{ range .JSON.commitments }}
          <div>{{ .due_date }}: {{ .commitment }} (to {{ .made_to }})</div>
          {{ end }}

      - type: custom-api
        title: "Email Status"
        url: "http://n8n:5678/webhook/email-status"
        cache: 15m
        template: |
          <div>TAS inbox: {{ .JSON.tas_unread }} unread</div>
          <div>Personal inbox: {{ .JSON.personal_unread }} unread</div>

  # ── Touchpoint 3: Evening Review ─────────────────
  - name: Evening Review
    columns: 2
    components:
      - type: custom-api
        title: "Gate Stats"
        url: "http://n8n:5678/webhook/evening-review"
        cache: 5m
        template: |
          <div>Pending review: {{ .JSON.pending }}</div>
          <div>Confirmed today: {{ .JSON.confirmed_today }}</div>
          <div>Rejected today: {{ .JSON.rejected_today }}</div>
          <div>Extractions today: {{ .JSON.runs }} runs, {{ .JSON.total_proposed }} items</div>

      - type: custom-api
        title: "Items to Review (HIGH confidence first)"
        url: "http://n8n:5678/webhook/gate-review"
        cache: 5m
        template: |
          {{ range .JSON.items }}
          <div style="margin-bottom:8px">
            <strong>[{{ .confidence_label }}]</strong> {{ .register_name }}<br/>
            {{ .proposed_data }}<br/>
            <small>ID: {{ .id }} | {{ .proposed_at }}</small>
          </div>
          {{ end }}

      - type: custom-api
        title: "Register Totals"
        url: "http://n8n:5678/webhook/register-stats"
        cache: 30m
        template: |
          {{ range .JSON }}
          <div>{{ .register_name }}: {{ .confirmed }} confirmed, {{ .pending }} pending, {{ .rejected }} rejected</div>
          {{ end }}

  # ── Daily Flash (Company OS) ─────────────────────
  - name: Daily Flash
    columns: 2
    components:
      - type: custom-api
        title: "Sales Pipeline"
        url: "http://n8n:5678/webhook/daily-flash"
        cache: 30m
        template: |
          {{ range .JSON.pipeline }}
          <div>{{ .stage }}: {{ .deal_count }} deals (${{ .total_value }})</div>
          {{ end }}

      - type: custom-api
        title: "Revenue MTD"
        url: "http://n8n:5678/webhook/daily-flash"
        cache: 30m
        template: |
          <div>Invoices paid: {{ .JSON.revenue.invoices_paid }}</div>
          <div>Revenue: ${{ .JSON.revenue.revenue }}</div>

      - type: custom-api
        title: "Overdue Invoices"
        url: "http://n8n:5678/webhook/daily-flash"
        cache: 30m
        template: |
          <div>Count: {{ .JSON.overdue.count }}</div>
          <div>Total overdue: ${{ .JSON.overdue.total_overdue }}</div>

      - type: custom-api
        title: "Support Tickets"
        url: "http://n8n:5678/webhook/daily-flash"
        cache: 30m
        template: |
          {{ range .JSON.tickets }}
          <div>{{ .priority }}: {{ .count }} open</div>
          {{ end }}

      - type: custom-api
        title: "Warranty Status"
        url: "http://n8n:5678/webhook/daily-flash"
        cache: 1h
        template: |
          <div>Active: {{ .JSON.warranty.active }}</div>
          <div>Expiring (30d): {{ .JSON.warranty.expiring }}</div>
          <div>Open claims: {{ .JSON.warranty.open_claims }}</div>

      - type: custom-api
        title: "Deals Closing This Week"
        url: "http://n8n:5678/webhook/daily-flash"
        cache: 30m
        template: |
          {{ range .JSON.closing_this_week }}
          <div>{{ .closing_date }}: {{ .deal_name }} (${{ .amount }}) — {{ .stage }}</div>
          {{ end }}

      - type: custom-api
        title: "Zoho Sync"
        url: "http://n8n:5678/webhook/daily-flash"
        cache: 15m
        template: |
          <div>Last sync: {{ .JSON.sync.completed_at }}</div>
          <div>Status: {{ .JSON.sync.status }} ({{ .JSON.sync.records_synced }} records)</div>

  # ── Agent Monitor ──────────────────────────────────
  - name: Agent Monitor
    columns: 2
    components:
      - type: custom-api
        title: "Agent Sessions (Today)"
        url: "http://n8n:5678/webhook/agent-status"
        cache: 5m
        template: |
          {{ range .JSON.stats }}
          <div>{{ .agent_context }}: {{ .today }} today ({{ .completed }} ok, {{ .failed }} failed)</div>
          {{ end }}

      - type: custom-api
        title: "Recent Sessions"
        url: "http://n8n:5678/webhook/agent-status"
        cache: 5m
        template: |
          {{ range .JSON.sessions }}
          <div style="margin-bottom:6px">
            <strong>[{{ .agent_context }}]</strong> {{ .status }} — {{ .input_summary }}<br/>
            <small>{{ .started_at }} ({{ .duration_seconds }}s)</small>
          </div>
          {{ end }}

      - type: custom-api
        title: "Agent Findings (PROPOSED)"
        url: "http://n8n:5678/webhook/agent-status"
        cache: 5m
        template: |
          {{ range .JSON.findings_stats }}
          <div>{{ .agent_context }}: {{ .proposed }} proposed, {{ .confirmed }} confirmed, {{ .rejected }} rejected</div>
          {{ end }}

      - type: custom-api
        title: "Recent Findings"
        url: "http://n8n:5678/webhook/agent-status"
        cache: 5m
        template: |
          {{ range .JSON.findings }}
          <div style="margin-bottom:6px">
            <strong>[{{ .confidence }}]</strong> {{ .finding_type }}: {{ .title }}<br/>
            <small>{{ .agent_context }} | {{ .status }} | {{ .created_at }}</small>
          </div>
          {{ end }}

      - type: custom-api
        title: "MCP Servers"
        url: "http://n8n:5678/webhook/agent-status"
        cache: 15m
        template: |
          {{ range .JSON.mcp_servers }}
          <div>{{ .server_name }} ({{ .layer }}): {{ .status }}</div>
          {{ end }}
